        const BASE_INCREASE = 0.075;
        const selectedPlans = new Map();

        window.addEventListener('DOMContentLoaded', initializePlans);

        function initializePlans() {
            const select = document.getElementById('plan-select');
            select.innerHTML = '<option value="">-- Select a plan --</option>';
            planData.plans.forEach(plan => {
                const option = document.createElement('option');
                option.value = plan.name;
                option.textContent = plan.name;
                select.appendChild(option);
            });
        }

        function addPlan() {
            const select = document.getElementById('plan-select');
            const planName = select.value;
            if (!planName || selectedPlans.has(planName)) {
                alert('Please select a valid plan.');
                return;
            }
            const plan = planData.plans.find(p => p.name === planName);
            selectedPlans.set(planName, { ...plan });
            renderPlans();
        }

        function removePlan(planName) {
            selectedPlans.delete(planName);
            renderPlans();
        }

        function renderPlans() {
            const container = document.getElementById('plans-container');
            container.innerHTML = '';
            selectedPlans.forEach((plan, planName) => {
                const card = document.createElement('div');
                card.className = 'plan-card filled';
                card.innerHTML = `
                    <div class="plan-header">
                        <div class="plan-name">${planName}</div>
                        <div class="plan-impact">${(plan.impact * 100 > 0 ? '+' : '')}${(plan.impact * 100).toFixed(1)}%</div>

                        <div class="tier-input">
                            <label>Employee Only</label>
                            <input type="number" data-plan="${planName}" data-tier="eo" min="0" step="1" value="0">
                        </div>
                        <div class="tier-input">
                            <label>Employee + Spouse</label>
                            <input type="number" data-plan="${planName}" data-tier="es" min="0" step="1" value="0">

                        <div class="tier-input">
                            <label>Employee + Family</label>

                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

                const changeRate = (1 + BASE_INCREASE) * (1 + plan.impact) - 1;
                
                const tiers = [{k:'eo', r:rates.eo}, {k:'es', r:rates.es}, {k:'ec', r:rates.ec}, {k:'ef', r:rates.ef}];
                let planCurrent = 0, planProjected = 0;
                
                tiers.forEach(t => {
                    const inputs = document.querySelectorAll(`input[data-plan="${planName}"][data-tier="${t.k}"]`);
                    const cnt = inputs.length > 0 ? parseFloat(inputs[0].value) || 0 : 0;
                    const cur = t.r * cnt * 12;
                    const proj = t.r * (1 + changeRate) * cnt * 12;
                    planCurrent += cur;
                    planProjected += proj;
                });
                
                totalCurrent += planCurrent;
                totalProjected += planProjected;
                
                const planChg = planProjected - planCurrent;
                const planPct = planCurrent > 0 ? (planChg / planCurrent * 100) : 0;
                
                results.push({ planName, planPct });
            });
            
            const chg = totalProjected - totalCurrent;
            const pct = totalCurrent > 0 ? (chg / totalCurrent * 100) : 0;
            displayResults(results, pct);
        }

        function displayResults(results, totalPct) {
            const resultsSection = document.getElementById('results-section');
            const changeClass = totalPct >= 0 ? 'increase' : 'decrease';
            const changeSign = totalPct >= 0 ? '+' : '';
            
            let planSummaryHtml = '';
            results.forEach(r => {
                const planSign = r.planPct >= 0 ? '+' : '';
                const planClass = r.planPct >= 0 ? 'positive' : 'negative';
                planSummaryHtml += `
                    <div class="plan-summary-row">
                        <div class="plan-summary-name">${r.planName}</div>
                        <div class="plan-summary-increase ${planClass}">
                            ${planSign}${r.planPct.toFixed(1)}%
                        </div>
                    </div>
                `;
            });
            
            resultsSection.innerHTML = `
                <div class="section-title">Expected Renewal Increase</div>
                <div class="result-card ${changeClass}">
                    <div class="result-label">Total Expected Increase</div>
                    <div class="result-value">${changeSign}${totalPct.toFixed(1)}%</div>
                </div>
                <div class="plan-summary">
                    <div style="font-weight: 600; margin-bottom: 15px; color: #333;">By Plan</div>
                    ${planSummaryHtml}
                </div>
            `;
            resultsSection.classList.add('show');
        }

        function resetCalculator() {
            selectedPlans.clear();
            document.getElementById('plan-select').value = '';
            document.getElementById('plans-container').innerHTML = '';
            document.getElementById('results-section').classList.remove('show');
        }
    </script>

</body></html>
